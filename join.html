<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pyramide des Gitans - Lobby</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/join.css">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header class="header-mobile">
            <div class="logo">
                <i class="fas fa-guitar"></i>
                <h1>Pyramide <span>des Gitans</span></h1>
            </div>
            <p class="subtitle">Le jeu qui pinent vos daronnes</p>
        </header>

        <div class="lobby-card">
            <div id="error-message" class="message error hidden"></div>
            <div id="success-message" class="message success hidden"></div>

            <h2><i class="fas fa-glass-cheers"></i> Lobby</h2>

            <div class="game-info">
                <p>ID de la partie :</p>
                <div class="game-id-display" id="display-game-id">Chargement...</div>
                <p id="player-count">Joueurs : <span class="count">0</span>/8</p>
            </div>

            <div class="players-section">
                <h3><i class="fas fa-users"></i> Joueurs :</h3>
                <div id="players-list" class="players-list">
                    <!-- Joueurs ajoutés dynamiquement -->
                </div>
            </div>

            <div class="lobby-actions">
                <div id="host-indicator" class="host-indicator hidden">
                    <i class="fas fa-crown"></i>
                    <span>Vous êtes l'hôte</span>
                </div>

                <button id="ready-button" class="btn btn-success">
                    <i class="fas fa-check"></i> Prêt !
                </button>
                <p id="ready-status" class="hint">Cliquez quand vous êtes prêt</p>

                <button id="leave-game" class="btn btn-danger">
                    <i class="fas fa-door-open"></i> Quitter
                </button>
            </div>
        </div>

        <footer class="footer-mobile">
            <p>Jeu créé avec <i class="fas fa-heart"></i></p>
            <div class="decoration">
                <i class="fas fa-music"></i>
                <i class="fas fa-guitar"></i>
                <i class="fas fa-drum"></i>
            </div>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/join.js"></script>
</body>
</html>
