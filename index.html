<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pyramide de Gitans - Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-guitar"></i>
                <h1>Pyramide <span>des Gitans</span></h1>
            </div>
            <p class="subtitle">Le jeu qui pinent vos daronnes</p>
        </header>

        <main class="card">
            <div class="profile-setup" id="profile-setup-section">
                <h2>Crée ton profil</h2>
                <div class="avatar-upload">
                    <input type="file" id="avatar-upload" accept="image/*" capture="user">
                    <label for="avatar-upload">
                        <div class="avatar-preview" id="avatar-preview">
                            <i class="fas fa-user-plus"></i>
                        </div>
                    </label>
                    <p class="hint">Ajoute ta photo (optionnel)</p>
                </div>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Ton nom de gitan" required maxlength="15">
                </div>
            </div>

            <div class="buttons" id="main-buttons">
                <button id="create-game" class="btn btn-create">
                    <i class="fas fa-plus-circle"></i>
                    <span>Créer une partie</span>
                </button>
                <button id="join-game" class="btn btn-join">
                    <i class="fas fa-search"></i>
                    <span>Rejoindre</span>
                </button>
            </div>

            <div id="join-form" class="hidden">
                <h2><i class="fas fa-door-open"></i> Rejoindre</h2>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="text" id="game-id-input" placeholder="Code de la partie" maxlength="6">
                </div>
                <button id="confirm-join" class="btn btn-confirm">
                    <i class="fas fa-check"></i>
                    <span>Valider</span>
                </button>
                 <button id="cancel-join" class="btn btn-secondary">
                    <i class="fas fa-times"></i>
                    <span>Annuler</span>
                </button>
            </div>
            
            <div id="error-message" class="message error hidden"></div>
            <div id="success-message" class="message success hidden"></div>
        </main>
    </div>

    <footer>
        <p>Jeu créé avec <i class="fas fa-heart"></i> par la communauté gitane</p>
        <div class="decoration">
            <i class="fas fa-music"></i>
            <i class="fas fa-guitar"></i>
            <i class="fas fa-drum"></i>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
