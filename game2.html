<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pyramide - Phase 2</title>
    <link rel="stylesheet" href="css/game2.css">
    <script src="js/game2.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div class="mobile-container">
        <header class="mobile-header">
            <div class="game-info-mobile">
                <div>Partie: <span id="game-id-mobile">ABC123</span></div>
                <div>Tour: <span id="current-turn-mobile">Joueur1</span></div>
            </div>
            <button id="menu-toggle" class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
        </header>

        <main class="game-main-area">
            <section class="pyramid-section">
                <h2 class="section-title"><i class="fas fa-crown"></i> Pyramide</h2>
                <div id="pyramid-container" class="pyramid-cards"></div>
            </section>

            <!-- SECTION POUR LES CARTES DES JOUEURS -->
            <section class="players-cards-section">
                <h2 class="section-title"><i class="fas fa-cards"></i> Cartes des Joueurs</h2>
                <div id="players-cards-container"></div>
            </section>
        </main>

        <div id="contextual-actions">
            <div class="action-title" id="action-title">Action Pyramide :</div>
            <div class="dynamic-buttons" id="dynamic-buttons"></div>
        </div>

        <div id="target-modal" class="modal hidden">
            <div class="modal-content">
                <h3>Donner <span id="sips-count">1</span> gorgée à :</h3>
                <div id="target-players" class="target-options"></div>
            </div>
        </div>

        <aside id="mobile-sidebar" class="mobile-sidebar">
            <div class="sidebar-header">
                <h3>Infos partie</h3>
                <button id="close-sidebar" class="close-btn"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="players-list">
                <h4><i class="fas fa-users"></i> Joueurs</h4>
                <div id="players-container"></div>
            </div>
            
            <div class="game-chat">
                <h4><i class="fas fa-comments"></i> Chat</h4>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="chat-input-mobile" placeholder="Écrire un message..." maxlength="100">
                    <button id="send-chat-mobile"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            
            <button id="leave-game-mobile" class="leave-btn"><i class="fas fa-door-open"></i> Quitter</button>
        </aside>

        <div id="toast-notification" class="toast hidden">
            <div class="toast-content"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/game2.js"></script>
</body>
</html>
